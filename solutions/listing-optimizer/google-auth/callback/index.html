<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Authorization · Luckee Listing</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/luckee-website/solutions/listing-optimizer/tokens.css">
  <script src="/luckee-website/solutions/listing-optimizer/google-ads-tag.js"></script>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(48% 52% at 20% 16%, rgba(77,112,78,.12), transparent 60%),
        radial-gradient(36% 40% at 84% 12%, rgba(201,168,76,.10), transparent 58%),
        var(--oat-100);
      padding: 24px;
    }
    .callback-shell {
      width: min(100%, 540px);
      text-align: center;
    }
    .callback-logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: var(--forest-600);
      color: var(--oat-100);
      font: 2.8rem var(--serif);
      box-shadow: var(--sh-brand);
    }
    .callback-card {
      background: var(--card);
      border: 1px solid rgba(28,43,29,.08);
      border-radius: 24px;
      padding: 36px 32px 30px;
      box-shadow: 0 22px 60px -30px rgba(28,43,29,.34);
    }
    .callback-status {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--oat-200);
      color: var(--forest-700);
    }
    .callback-spinner {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid rgba(61,90,62,.18);
      border-top-color: var(--forest-600);
      animation: callback-spin .8s linear infinite;
    }
    @keyframes callback-spin {
      to { transform: rotate(360deg); }
    }
    .callback-icon {
      width: 30px;
      height: 30px;
      display: none;
    }
    .callback-card[data-state="success"] .callback-icon-success,
    .callback-card[data-state="error"] .callback-icon-error {
      display: block;
    }
    .callback-card[data-state="success"] .callback-status {
      background: var(--success-bg);
      color: var(--success-600);
    }
    .callback-card[data-state="error"] .callback-status {
      background: var(--error-bg);
      color: var(--error-600);
    }
    .callback-card[data-state="success"] .callback-spinner,
    .callback-card[data-state="error"] .callback-spinner {
      display: none;
    }
    .callback-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 1.06;
      color: var(--neutral-900);
    }
    .callback-copy {
      margin: 14px auto 0;
      max-width: 28ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }
    .callback-action {
      margin-top: 24px;
      display: none;
      justify-content: center;
    }
    .callback-card[data-state="error"] .callback-action {
      display: flex;
    }
  </style>
</head>
<body>
  <main class="callback-shell">
    <div class="callback-logo">L</div>
    <section class="callback-card" data-state="loading" id="callback-card">
      <div class="callback-status" aria-hidden="true">
        <div class="callback-spinner"></div>
        <svg class="callback-icon callback-icon-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m5 12 5 5L20 7"></path>
        </svg>
        <svg class="callback-icon callback-icon-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 8v5"></path>
          <path d="M12 16h.01"></path>
        </svg>
      </div>
      <h1 class="callback-title" id="callback-title">Completing Google authorization</h1>
      <p class="callback-copy" id="callback-copy">Please wait while we verify the authorization result.</p>
      <div class="callback-action">
        <a class="btn btn-primary" href="/luckee-website/solutions/listing-optimizer/">Back to Luckee Listing</a>
      </div>
    </section>
  </main>

  <script src="/luckee-website/solutions/listing-optimizer/analytics-config.js"></script>
  <script src="/luckee-website/solutions/listing-optimizer/analytics-sdk.js"></script>
  <script src="/luckee-website/solutions/listing-optimizer/tracking.js"></script>
  <script src="/luckee-website/solutions/listing-optimizer/auth.js"></script>
  <script>
    (function () {
      const card = document.getElementById("callback-card");
      const title = document.getElementById("callback-title");
      const copy = document.getElementById("callback-copy");

      function setState(state, nextTitle, nextCopy) {
        card.dataset.state = state;
        title.textContent = nextTitle;
        copy.textContent = nextCopy;
      }

      function trackGoogleAuthComplete(result) {
        const userInfo = result && result.userInfo ? result.userInfo : null;
        if (!userInfo) return;
        window.LuckeeListingTrack?.identify?.(userInfo, { auth_method: "google", keepalive: true });
      }

      // After the authorization code/state have been consumed, strip them from the
      // address bar so they do not leak into analytics events or into the next
      // page's document.referrer (which would otherwise reach GTM / Google Ads).
      function scrubCallbackUrl() {
        try {
          window.history.replaceState(null, "", window.location.pathname);
        } catch (err) {}
      }

      if (!window.LuckeeAuth?.completeGoogleAuthIfNeeded) {
        setState(
          "error",
          "Google authorization failed",
          "Authorization service is not ready. Please return to Luckee Listing and try again."
        );
        return;
      }

      window.LuckeeAuth.completeGoogleAuthIfNeeded()
        .then((result) => {
          if (!result || !result.handled) {
            setState(
              "error",
              "Missing Google authorization parameters",
              "The callback URL is missing the required authorization parameters."
            );
            return;
          }
          scrubCallbackUrl();
          trackGoogleAuthComplete(result);
          if (result.redirected) {
            setState(
              "success",
              "Google authorization complete",
              "Authorization succeeded. Returning to Luckee Listing..."
            );
            return;
          }
          setState(
            "success",
            "Google authorization complete",
            "Authorization succeeded. You can continue in Luckee Listing."
          );
          window.setTimeout(() => {
            window.location.href = "/solutions/listing-optimizer/";
          }, 600);
        })
        .catch((error) => {
          setState(
            "error",
            "Google authorization failed",
            error?.message || "Unable to complete Google authorization. Please try again."
          );
        });
    })();
  </script>
</body>
</html>
