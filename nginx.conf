server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  location = /home {
    try_files /index.html =404;
  }

  location = /home/ {
    try_files /index.html =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }
}
